<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - AutoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#111827;" class="text-light">
<nav class="navbar navbar-dark shadow" style="background:#0b1220; border-bottom:1px solid #374151;">
    <div class="container">
        <span class="navbar-brand">AutoLux | Contacto</span>
        <div>
            <a href="{{ url_for('comprar') }}" class="btn btn-outline-light btn-sm me-2">Catálogo</a>
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">Inicio</a>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="card text-light border-0 shadow" style="background:#1f2937; border-top:4px solid #f59e0b;">
        <div class="card-body p-5">
            <h1>AutoLux</h1>
            <p class="text-light-emphasis">Vehículos seminuevos seleccionados con atención personalizada.</p>

            <div class="row g-3 mt-3">
                <div class="col-md-4">
                    <div class="p-4 rounded" style="background:#0f172a;">
                        <h5>WhatsApp</h5>
                        <p>{{ admin_phone }}</p>
                        <a href="https://wa.me/52{{ admin_phone }}?text=Hola%20AutoLux,%20quiero%20información" target="_blank" class="btn btn-success w-100">Enviar mensaje</a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-4 rounded" style="background:#0f172a;">
                        <h5>Correo</h5>
                        <p>agenciaautos67@gmail.com</p>
                        <a href="mailto:agenciaautos67@gmail.com" class="btn btn-warning w-100">Enviar correo</a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="p-4 rounded" style="background:#0f172a;">
                        <h5>Ubicación</h5>
                        <p>Ciudad Juárez, Chihuahua</p>
                        <a href="{{ url_for('vender') }}" class="btn btn-info w-100">Quiero vender mi auto</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
