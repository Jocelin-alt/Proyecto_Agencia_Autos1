<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-black shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Agregar vehículo</span>
            <div>
                <a href="{{ url_for('index') }}" class="btn btn-secondary me-2">Volver</a>
                <a href="{{ url_for('logout') }}" class="btn btn-danger">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="card bg-secondary text-light shadow-lg border-0">
            <div class="card-body p-5">
                <h2 class="card-title mb-4">Registrar vehículo</h2>
                <form method="POST" action="{{ url_for('agregar') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título del vehículo</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" placeholder="Ej. Toyota Corolla 2022" required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="5" placeholder="Color, kilometraje, estado, precio..." required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="imagen" class="form-label">Imagen del vehículo</label>
                        <input class="form-control" type="file" id="imagen" name="imagen" accept="image/*">
                        <div class="form-text">Opcional. Se mostrará en la página de compra.</div>
                    </div>
                    <button type="submit" class="btn btn-primary">Agregar vehículo</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
