<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoLux</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#111827;" class="d-flex justify-content-center align-items-center min-vh-100">

    <div class="card shadow-lg border-0" style="width: 420px; border-top:4px solid #f59e0b;">
        <div class="card-body p-5">
            <h2 class="text-center mb-1">AutoLux</h2>
            <p class="text-center text-muted mb-4">Agencia de autos seminuevos</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <a href="{{ url_for('recuperar_contrasena') }}" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                <button type="submit" class="btn btn-warning w-100 mt-4">Entrar</button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted">¿No tienes cuenta?</span>
                <a href="{{ url_for('registro') }}" class="text-decoration-none fw-bold">Crear cuenta</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
